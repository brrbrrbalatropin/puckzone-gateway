server:
  port: 8080

spring:
  application:
    name: puckzone-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Actuator: expone solo /actuator/health y habilita los grupos liveness/readiness
# que Azure Container Apps usa como health probes. Los servimos localmente
# (no es una ruta enrutada), así que los filtros JWT/rate-limit no aplican aquí.
management:
  endpoints:
    web:
      exposure:
        # prometheus: métricas para Grafana. A diferencia de los servicios
        # internos, aquí el endpoint queda expuesto a internet, por eso el
        # MetricsTokenFilter le exige el token estático puckzone.metrics.token.
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    distribution:
      # Histograma de latencias de los requests proxeados: habilita p95/p99
      # reales en Grafana (histogram_quantile sobre los buckets).
      percentiles-histogram:
        http.server.requests: true

puckzone:
  cors:
    # Lista separada por comas. En Azure se sobreescribe con el dominio del frontend.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    # SOLO para desarrollo local. En Azure se inyecta PUCKZONE_JWT_SECRET.
    secret: ${PUCKZONE_JWT_SECRET:puckzone-dev-secret-change-me-please-32bytes-min!!}
  rate-limit:
    requests-per-minute: ${RATE_LIMIT_PER_MINUTE:100}
    # Contador del límite: memory SOLO local (réplica única); en Azure
    # Terraform inyecta redis — obligatorio con 2+ réplicas para que el
    # límite por IP sea global y no por instancia.
    store: ${RATE_LIMIT_STORE:memory}
  metrics:
    # Token que exige /actuator/prometheus (Bearer). SOLO para desarrollo
    # local; en Azure se inyecta PUCKZONE_METRICS_TOKEN desde el remote state.
    token: ${PUCKZONE_METRICS_TOKEN:puckzone-dev-metrics-token}
  services:
    auth: ${AUTH_SERVICE_URL:http://localhost:8081}
    matchmaking: ${MATCHMAKING_SERVICE_URL:http://localhost:8082}
    game: ${GAME_SERVICE_URL:http://localhost:8083}
    ranking: ${RANKING_SERVICE_URL:http://localhost:8084}
    # Shards de game (sharding por partida), separados por comas y EN ORDEN:
    # la posición i atiende /ws-{i}. Debe ser la MISMA lista (mismo orden)
    # que el GAME_SHARD_URLS de matchmaking, que es quien asigna el shard.
    game-shards: ${GAME_SHARD_URLS:http://localhost:8083}
