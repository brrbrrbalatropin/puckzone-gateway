<!DOCTYPE html>
<!--
  Swagger UI unica de PuckZone, servida como recurso estatico del gateway
  (publica: no es ruta enrutada, los GlobalFilter JWT/rate-limit no aplican).
  El dropdown lista las specs de los servicios internos, que llegan por las
  rutas /docs/{servicio}/v3/api-docs de RouteConfig. Los assets salen del
  webjar org.webjars:swagger-ui (WebFlux los sirve en /webjars/**).
-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PuckZone — API Docs</title>
  <link rel="stylesheet" href="/webjars/swagger-ui/5.25.3/swagger-ui.css">
</head>
<body>
<div id="swagger-ui"></div>
<script src="/webjars/swagger-ui/5.25.3/swagger-ui-bundle.js"></script>
<script src="/webjars/swagger-ui/5.25.3/swagger-ui-standalone-preset.js"></script>
<script>
  window.ui = SwaggerUIBundle({
    urls: [
      { name: 'auth', url: '/docs/auth/v3/api-docs' },
      { name: 'matchmaking', url: '/docs/matchmaking/v3/api-docs' },
      { name: 'game', url: '/docs/game/v3/api-docs' },
      { name: 'ranking', url: '/docs/ranking/v3/api-docs' }
    ],
    dom_id: '#swagger-ui',
    presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
    layout: 'StandaloneLayout'
  })
</script>
</body>
</html>
